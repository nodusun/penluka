name: Daily Manga Update

on:
  schedule:
    # 毎日朝6時(JST) = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write API credentials
        run: |
          mkdir -p ~/.claude
          cat > ~/.claude/amazon-creators-api.json <<'EOF'
          ${{ secrets.AMAZON_CREATORS_API_JSON }}
          EOF
          chmod 600 ~/.claude/amazon-creators-api.json

      - name: Fetch manga data
        run: python fetch_manga.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git add data.json
            git commit -m "chore: daily manga update ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to data.json"
          fi
